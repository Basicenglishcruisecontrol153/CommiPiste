# CommiPiste built-in platform definitions (single source of truth).
#
# Structure:
#   defaults:   values merged into EVERY platform (a platform key overrides them).
#   platforms:  <name> -> overrides. Only non-default fields are listed; everything else comes from
#               `defaults` above or the Project model defaults (kind: core, empty banners, etc.).
#   extends:    optional — a platform may `extends: <other>` to inherit another entry`s fields.
#
# Add a platform: append an entry under `platforms:` with at least `repo_url` + `public_paths`
# (git-blob) OR a `version_probe` (active-probe). Then `CommiPiste index <name>` (git-blob only).

defaults:
  source: git
  commit_url_tpl: '{repo_url}/tree/{sha}'
platforms:
  acf:
    repo_url: https://github.com/AdvancedCustomFields/acf
    served_prefix: wp-content/plugins/advanced-custom-fields
    public_paths:
    - assets
    kind: plugin
  akismet:
    repo_url: https://plugins.svn.wordpress.org/akismet
    source: wporg
    commit_url_tpl: '{repo_url}/tags/{sha}/'
    served_prefix: wp-content/plugins/akismet
    public_paths:
    - _inc
    - views
    kind: plugin
    cpe: cpe:2.3:a:automattic:akismet
  b2evolution:
    repo_url: https://github.com/b2evolution/b2evolution
    public_paths:
    - rsc
    banners:
      body_regex:
      - b2evolution
  bareos:
    repo_url: https://github.com/bareos/bareos
    repo_subdir: webui/public
    public_paths:
    - css
    - js
    - themes
    banners:
      body_regex:
      - Bareos
      - bareos-webui
    probe_files:
    - js/custom-functions.js
  bbpress:
    repo_url: https://github.com/bbpress/bbPress
    served_prefix: wp-content/plugins/bbpress
    public_paths:
    - templates
    probe_files:
    - templates/default/css/bbpress.css
